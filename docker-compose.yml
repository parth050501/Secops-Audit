version: "3.9"
services:
  backend:
    build: ./backend
    container_name: secops-backend
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-secops-dev-secret-change-in-prod}
      - DATABASE_URL=sqlite+aiosqlite:///./data/secops.db
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - backend_data:/app/data
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: secops-frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
